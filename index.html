<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>150 Hard AI Project Ideas — BTech</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --card: #1a1a26;
  --border: rgba(255,255,255,0.07);
  --accent: #7c6cfc;
  --accent2: #fc6c8f;
  --accent3: #6cfcd0;
  --text: #e8e8f0;
  --muted: #7a7a9a;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --display: 'Syne', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

/* Grid noise overlay */
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,0.012) 40px,rgba(255,255,255,0.012) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.012) 40px,rgba(255,255,255,0.012) 41px);pointer-events:none;z-index:0}

header{position:relative;z-index:1;padding:60px 48px 40px;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}
h1{font-family:var(--display);font-size:clamp(36px,5vw,64px);font-weight:800;line-height:1;letter-spacing:-2px}
h1 span{color:var(--accent)}
.subtitle{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:12px;letter-spacing:0.5px}
.counter{font-family:var(--display);font-size:80px;font-weight:800;color:rgba(124,108,252,0.12);line-height:1;text-align:right;letter-spacing:-4px}

.controls{padding:28px 48px;border-bottom:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:center;position:sticky;top:0;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);z-index:10}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px 9px 36px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap::before{content:'⌕';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.search-wrap input::placeholder{color:var(--muted)}

.domain-filters{display:flex;gap:6px;flex-wrap:wrap}
.df{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all .2s;letter-spacing:.3px}
.df.active,.df:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.df[data-d="Medical"].active{background:#fc6c8f;border-color:#fc6c8f}
.df[data-d="Education"].active{background:#6c9ffc;border-color:#6c9ffc}
.df[data-d="Agriculture"].active{background:#6cfcb2;border-color:#6cfcb2;color:#0a0a0f}
.df[data-d="Smart City"].active{background:#fcca6c;border-color:#fcca6c;color:#0a0a0f}
.df[data-d="Business"].active{background:#c46cfc;border-color:#c46cfc}
.df[data-d="Cybersecurity"].active{background:#fc9c6c;border-color:#fc9c6c;color:#0a0a0f}
.df[data-d="Environment"].active{background:#6cfcd0;border-color:#6cfcd0;color:#0a0a0f}
.df[data-d="Legal"].active{background:#fc6c6c;border-color:#fc6c6c}
.df[data-d="Social"].active{background:#6cf0fc;border-color:#6cf0fc;color:#0a0a0f}

.stat-bar{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
.stat-bar span{color:var(--accent);font-weight:500}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1px;background:var(--border);position:relative;z-index:1}
.card{background:var(--card);padding:22px 24px;position:relative;overflow:hidden;transition:background .2s;cursor:default}
.card:hover{background:#1f1f2e}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s}
.card:hover::before{opacity:1}
.card[data-d="Medical"]::before{background:linear-gradient(90deg,#fc6c8f,#fc9caf)}
.card[data-d="Education"]::before{background:linear-gradient(90deg,#6c9ffc,#9cbffc)}
.card[data-d="Agriculture"]::before{background:linear-gradient(90deg,#6cfcb2,#9cfcd0)}
.card[data-d="Smart City"]::before{background:linear-gradient(90deg,#fcca6c,#fce09c)}
.card[data-d="Business"]::before{background:linear-gradient(90deg,#c46cfc,#d49cfc)}
.card[data-d="Cybersecurity"]::before{background:linear-gradient(90deg,#fc9c6c,#fcbc9c)}
.card[data-d="Environment"]::before{background:linear-gradient(90deg,#6cfcd0,#9cfce8)}
.card[data-d="Legal"]::before{background:linear-gradient(90deg,#fc6c6c,#fc9c9c)}
.card[data-d="Social"]::before{background:linear-gradient(90deg,#6cf0fc,#9cf8fc)}
.card.hidden{display:none}

.card-num{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
.card-title{font-family:var(--display);font-size:16px;font-weight:700;line-height:1.3;margin-bottom:8px;color:#fff}
.card-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.card-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.domain-badge{font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:4px;letter-spacing:.3px}
.diff-badge{font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:4px;margin-left:auto;letter-spacing:.3px}
.diff-hard{background:rgba(252,108,143,0.15);color:#fc6c8f;border:1px solid rgba(252,108,143,0.2)}
.diff-expert{background:rgba(252,100,100,0.15);color:#fc6464;border:1px solid rgba(252,100,100,0.2)}

.domain-badge[data-d="Medical"]{background:rgba(252,108,143,0.12);color:#fc8faa;border:1px solid rgba(252,108,143,0.15)}
.domain-badge[data-d="Education"]{background:rgba(108,159,252,0.12);color:#8fb4fc;border:1px solid rgba(108,159,252,0.15)}
.domain-badge[data-d="Agriculture"]{background:rgba(108,252,178,0.1);color:#6fcfaa;border:1px solid rgba(108,252,178,0.12)}
.domain-badge[data-d="Smart City"]{background:rgba(252,202,108,0.1);color:#c8a060;border:1px solid rgba(252,202,108,0.12)}
.domain-badge[data-d="Business"]{background:rgba(196,108,252,0.12);color:#c48ffc;border:1px solid rgba(196,108,252,0.15)}
.domain-badge[data-d="Cybersecurity"]{background:rgba(252,156,108,0.12);color:#fc9c6c;border:1px solid rgba(252,156,108,0.15)}
.domain-badge[data-d="Environment"]{background:rgba(108,252,208,0.1);color:#6fcfb4;border:1px solid rgba(108,252,208,0.12)}
.domain-badge[data-d="Legal"]{background:rgba(252,108,108,0.12);color:#fc9090;border:1px solid rgba(252,108,108,0.15)}
.domain-badge[data-d="Social"]{background:rgba(108,240,252,0.1);color:#70c8d4;border:1px solid rgba(108,240,252,0.12)}

.tech-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.tech-tag{font-size:10px;font-family:var(--mono);padding:2px 7px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:3px;color:var(--muted)}

.empty{padding:80px;text-align:center;font-family:var(--mono);color:var(--muted);grid-column:1/-1;font-size:14px}
footer{padding:40px 48px;border-top:1px solid var(--border);font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center;position:relative;z-index:1}
</style>
</head>

<header>
  <div class="header-top">
    <div>
      <h1>150 <span>Hard</span><br>AI Projects</h1>

<script>
const projects = [
// ─── MEDICAL (20) ───────────────────────────────────────────────────────────

{n:6,d:"Medical",title:"Drug Repurposing via Knowledge Graph",desc:"Build a biomedical knowledge graph (diseases, genes, drugs) and use GNN link-prediction to surface novel drug-disease candidates, validated against known repurposed drugs.",tags:["GNN","Knowledge Graph","Neo4j"],diff:"expert"},

{n:8,d:"Medical",title:"Mental Health Symptom Progression Tracker",desc:"NLP pipeline that analyses longitudinal therapy transcripts to track symptom severity trends using PHQ-9 proxy scoring, with privacy-preserving on-device inference.",tags:["NLP","LLM","Longitudinal"],diff:"hard"},
{n:9,d:"Medical",title:"Polyp Detection with Uncertainty Quantification",desc:"Detect colonic polyps in colonoscopy video with a Bayesian CNN that outputs calibrated uncertainty scores, flagging ambiguous frames for specialist review.",tags:["Bayesian CNN","Uncertainty","Video ML"],diff:"expert"},
{n:10,d:"Medical",title:"Personalised Chemotherapy Dosing Agent",desc:"RL agent trained on pharmacokinetic models that recommends chemo dose adjustments based on patient biomarkers, minimising toxicity while maintaining therapeutic efficacy.",tags:["Reinforcement Learning","PK/PD","Safety ML"],diff:"expert"},

{n:12,d:"Medical",title:"Chest X-Ray Report Generator",desc:"End-to-end vision-language model that takes a chest X-ray and produces a radiologist-style structured report, fine-tuned on Indiana University Chest X-Ray dataset.",tags:["VLM","CheXpert","NLG"],diff:"hard"},

{n:18,d:"Medical",title:"Clinical Trial Eligibility Screener",desc:"RAG + NER pipeline that reads unstructured EHR notes and auto-matches patients to clinical trial eligibility criteria, reducing manual screening time by 80%.",tags:["RAG","NER","EHR"],diff:"hard"},

const domains = ["All","Medical","Education","Agriculture","Smart City","Business","Cybersecurity","Environment","Legal","Social"];
let activeDomain = "All";
let searchQ = "";

function render(){
  const grid = document.getElementById("grid");
  let shown = 0;
  projects.forEach(p => {
    const el = document.getElementById("c"+p.n);
    const domainMatch = activeDomain === "All" || p.d === activeDomain;
    const q = searchQ.toLowerCase();
    const searchMatch = !q || p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.tags.some(t=>t.toLowerCase().includes(q)) || p.d.toLowerCase().includes(q);
    if(domainMatch && searchMatch){ el.classList.remove("hidden"); shown++; }
    else el.classList.add("hidden");
  });
  document.getElementById("shown").textContent = shown;
}

// Build filters
const fb = document.getElementById("filters");
domains.forEach(d=>{
  const b = document.createElement("button");
  b.className="df"+(d==="All"?" active":"");
  b.setAttribute("data-d",d);
  b.textContent = d==="All"?"All (150)":d;
  b.onclick=()=>{
    activeDomain=d;
    document.querySelectorAll(".df").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
  fb.appendChild(b);
});

// Search
document.getElementById("search").addEventListener("input",e=>{searchQ=e.target.value;render();});

// Build cards
const grid = document.getElementById("grid");
projects.forEach(p=>{
  const div = document.createElement("div");
  div.className="card";
  div.id="c"+p.n;
  div.setAttribute("data-d",p.d);
  div.innerHTML=`
    <div class="card-num">#${String(p.n).padStart(3,"0")} · ${p.d.toUpperCase()}</div>
    <div class="card-title">${p.title}</div>
    <div class="card-desc">${p.desc}</div>
    <div class="tech-tags">${p.tags.map(t=>`<span class="tech-tag">${t}</span>`).join("")}</div>
    <div class="card-footer">
      <span class="domain-badge" data-d="${p.d}">${p.d}</span>
      <span class="diff-badge diff-${p.diff}">${p.diff}</span>
    </div>
  `;
  grid.appendChild(div);
});
</script>
